<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BlueGen AI | Universal v16.0</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;400;500;700&family=JetBrains+Mono:wght@300;400;600;800&family=Inter:wght@300;400;500;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/night-owl.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    
    <style>
        :root { 
            --bg-deep: #010409;
            --bg-surface: #0d1117;
            --accent: #58a6ff;
            --accent-glow: rgba(88, 166, 255, 0.15);
            --border: #30363d;
            --text-primary: #c9d1d9;
            --text-secondary: #8b949e;
        }

        /* Base Setup */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--bg-deep); 
            color: var(--text-primary);
            height: 100dvh; /* Dynamic Viewport Height for Mobile */
            overflow: hidden;
            margin: 0;
            display: flex;
        }

        code, pre, .mono { font-family: 'JetBrains Mono', monospace; }

        /* Sidebar Responsive Logic */
        .sidebar-dev { 
            background: var(--bg-deep); 
            border-right: 1px solid var(--border);
            width: 280px;
            height: 100%;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: fixed;
            left: 0;
            z-index: 100;
        }

        /* Tablet/Desktop logic: Push content if screen > 1024px */
        @media (min-width: 1024px) {
            .sidebar-dev { position: relative; }
            .sidebar-collapsed { margin-left: -280px; opacity: 0; }
        }

        /* Mobile logic: Overlay if screen < 1024px */
        @media (max-width: 1023px) {
            .sidebar-dev { transform: translateX(-100%); }
            .sidebar-active { transform: translateX(0); box-shadow: 20px 0 50px rgba(0,0,0,0.8); }
        }

        /* Chat Layout */
        #chatBox {
            scrollbar-gutter: stable;
            overflow-x: hidden;
        }

        /* Responsivitas Bubble Chat */
        .ai-bubble-content { 
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            width: 100%;
        }

        .markdown-body { font-size: 14px; line-height: 1.6; }
        .markdown-body pre { overflow-x: auto; max-width: 100%; }

        /* Input Bar Responsive */
        .input-cli {
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            max-width: 100%;
        }

        /* Overlay for Mobile */
        #overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.5);
            z-index: 90; display: none; backdrop-filter: blur(4px);
        }

        /* Keyframes */
        .animate-reveal { animation: reveal 0.2s ease-out forwards; }
        @keyframes reveal { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        ::-webkit-scrollbar { width: 3px; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
    </style>
</head>
<body>

    <div id="overlay" onclick="toggleSidebar()"></div>

    <aside id="sidebar" class="sidebar-dev flex flex-col">
        <div class="p-6 flex-1 overflow-y-auto">
            <div class="flex items-center gap-3 mb-8">
                <div class="bg-blue-600 p-2 rounded-lg"><i data-lucide="terminal-square" class="text-white w-5 h-5"></i></div>
                <h1 class="font-black text-sm text-white uppercase tracking-tighter">BlueGen <span class="text-blue-500">v16</span></h1>
            </div>

            <nav class="space-y-1">
                <p class="text-[10px] text-gray-600 font-bold uppercase tracking-widest mb-4">Workspace</p>
                <button onclick="copyLast()" class="w-full flex items-center gap-3 p-3 rounded-xl hover:bg-white/5 text-[13px] transition-all">
                    <i data-lucide="copy" class="w-4 h-4 text-accent"></i> Copy Output
                </button>
                <button onclick="showDevInfo()" class="w-full flex items-center gap-3 p-3 rounded-xl hover:bg-white/5 text-[13px] transition-all">
                    <i data-lucide="user" class="w-4 h-4 text-green-400"></i> Dev Profile
                </button>
                <button onclick="clearMemory()" class="w-full flex items-center gap-3 p-3 rounded-xl hover:bg-red-500/10 text-[13px] text-gray-500 hover:text-red-400">
                    <i data-lucide="trash-2" class="w-4 h-4"></i> Flush System
                </button>
            </nav>
        </div>

        <div class="p-6 border-t border-white/5">
            <div class="flex items-center gap-2 mb-2">
                <div class="w-2 h-2 rounded-full bg-green-500"></div>
                <span class="text-[10px] text-gray-500 font-bold">NODE: ONLINE</span>
            </div>
            <p id="displayName" class="text-xs font-bold text-white mono truncate italic">Divzz_Dev</p>
        </div>
    </aside>

    <main class="flex-1 flex flex-col min-w-0 bg-[#010409]">
        <header class="h-14 border-b border-white/5 flex items-center px-4 bg-var(--bg-deep) justify-between shrink-0">
            <div class="flex items-center gap-3">
                <button onclick="toggleSidebar()" class="p-2 hover:bg-white/5 rounded-lg text-gray-400">
                    <i data-lucide="menu" class="w-5 h-5"></i>
                </button>
                <div class="hidden sm:flex items-center gap-4 text-[10px] font-bold tracking-widest mono uppercase">
                    <span class="text-blue-400">workspace.sys</span>
                    <span class="text-gray-700">v16.0_stable</span>
                </div>
            </div>
            <div class="flex items-center gap-4">
                <i data-lucide="shield-check" class="w-4 h-4 text-green-500/50"></i>
                <i data-lucide="settings" class="w-4 h-4 text-gray-600"></i>
            </div>
        </header>

        <div id="chatBox" class="flex-1 overflow-y-auto p-4 md:px-20 lg:px-48 xl:px-64 space-y-8 pt-8">
            <div id="welcomeScreen" class="py-12 text-center animate-reveal">
                <div class="w-16 h-16 bg-blue-600/10 rounded-full flex items-center justify-center mx-auto mb-6 border border-blue-500/20">
                    <i data-lucide="cpu" class="w-8 h-8 text-blue-500"></i>
                </div>
                <h2 class="text-2xl font-black text-white mb-2">Welcome To BlueGenAi</h2>
                <p class="text-gray-500 text-xs mono tracking-widest uppercase">Target: Divzz // Mode: Programmer</p>
            </div>
        </div>

        <div class="p-4 md:p-8 bg-gradient-to-t from-bg-deep to-transparent">
            <div class="max-w-4xl mx-auto">
                <div class="input-cli flex items-end p-2 gap-2">
                    <div class="pb-3 pl-3 text-accent font-bold mono text-sm hidden sm:block">$</div>
                    <textarea id="userInput" rows="1" placeholder="Enter command..." 
                        class="flex-1 bg-transparent border-none py-3 px-2 focus:outline-none text-[15px] text-gray-200 placeholder-gray-700 resize-none mono max-h-40"></textarea>
                    <button onclick="handleSend()" class="p-3 bg-blue-600 text-white rounded-xl hover:bg-blue-500 transition-colors shadow-lg shadow-blue-900/20">
                        <i data-lucide="send-horizontal" class="w-5 h-5"></i>
                    </button>
                </div>
                <p class="text-[9px] text-center mt-3 text-gray-700 font-bold tracking-widest uppercase">Cross-Platform Interface v16.0</p>
            </div>
        </div>
    </main>

    <div id="devModal" class="fixed inset-0 z-[300] flex items-center justify-center bg-black/90 backdrop-blur-md hidden p-4">
        <div class="bg-[#0d1117] border border-white/10 w-full max-w-sm rounded-3xl overflow-hidden animate-reveal">
            <div class="p-8 text-center">
                <div class="w-20 h-20 rounded-full bg-blue-600 mx-auto mb-6 flex items-center justify-center shadow-2xl shadow-blue-500/20">
                    <i data-lucide="code-2" class="w-10 h-10 text-white"></i>
                </div>
                <h3 class="text-xl font-black text-white mb-1">Divzz</h3>
                <p class="text-blue-500 text-[10px] mono font-bold uppercase tracking-widest mb-6">Fullstack Developer</p>
                
                <div class="space-y-2 text-left text-xs mono">
                    <div class="p-3 bg-white/5 rounded-xl flex justify-between">
                        <span class="text-gray-500">IG:</span> <span class="text-white">divzz_neverlouse</span>
                    </div>
                    <div class="p-3 bg-white/5 rounded-xl flex justify-between">
                        <span class="text-gray-500">TECH:</span> <span class="text-white">PHP / PY / JS</span>
                    </div>
                </div>
                <button onclick="closeDevInfo()" class="mt-8 w-full py-3 bg-white/5 hover:bg-white/10 text-gray-400 rounded-xl transition-all">Close Manifest</button>
            </div>
        </div>
    </div>

    <script>
        const GROQ_KEY = "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";
        const chatBox = document.getElementById('chatBox');
        const userInput = document.getElementById('userInput');
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('overlay');
        let lastResp = "";

        lucide.createIcons();

        function toggleSidebar() {
            const isMobile = window.innerWidth < 1024;
            if(isMobile) {
                sidebar.classList.toggle('sidebar-active');
                overlay.style.display = sidebar.classList.contains('sidebar-active') ? 'block' : 'none';
            } else {
                sidebar.classList.toggle('sidebar-collapsed');
            }
        }

        function formatAIResponse(text) {
            let html = marked.parse(text);
            const parser = new DOMParser();
            const doc = parser.parseFromString(html, 'text/html');
            doc.querySelectorAll('pre').forEach((pre, index) => {
                const header = document.createElement('div');
                header.className = 'flex justify-between items-center bg-[#161b22] border border-[#30363d] border-b-0 p-2 px-4 rounded-t-xl text-[10px] mono text-gray-500';
                header.innerHTML = `<span>Module_${index+1}.bin</span> <button onclick="downloadCode(this.parentElement.nextElementSibling.innerText, 'script.txt')" class="text-accent">Download</button>`;
                pre.parentNode.insertBefore(header, pre);
                pre.classList.add('!rounded-t-none', '!rounded-b-xl', '!mt-0');
            });
            return doc.body.innerHTML;
        }

        function appendToUI(role, text) {
            const div = document.createElement('div');
            div.className = `flex ${role === 'user' ? 'justify-end' : 'justify-start'} animate-reveal w-full`;
            
            if(role === 'user') {
                div.innerHTML = `<div class="bg-blue-600 text-white px-4 py-2.5 rounded-2xl rounded-tr-none text-sm mono shadow-lg shadow-blue-900/20 max-w-[85%]">>> ${text}</div>`;
            } else {
                div.innerHTML = `
                    <div class="ai-bubble-content p-5 md:p-8 space-y-4">
                        <div class="flex items-center gap-2 border-b border-white/5 pb-3 mb-4">
                            <div class="w-2 h-2 rounded-full bg-accent animate-pulse"></div>
                            <span class="text-[10px] mono font-bold text-accent uppercase tracking-widest">System_Output</span>
                        </div>
                        <div class="markdown-body prose prose-invert max-w-none">
                            ${text === 'Thinking...' ? '<span class="animate-pulse text-accent mono">Analyzing_Resources...</span>' : formatAIResponse(text)}
                        </div>
                    </div>`;
            }

            chatBox.appendChild(div);
            lucide.createIcons();
            div.querySelectorAll('pre code').forEach(el => hljs.highlightElement(el));
            chatBox.scrollTop = chatBox.scrollHeight;
            return div.querySelector('.markdown-body') || div;
        }

        async function handleSend() {
            const text = userInput.value.trim();
            if (!text) return;
            
            if(window.innerWidth < 1024) { sidebar.classList.remove('sidebar-active'); overlay.style.display = 'none'; }
            document.getElementById('welcomeScreen').classList.add('hidden');
            
            appendToUI('user', text);
            userInput.value = '';
            userInput.style.height = 'auto';

            const loading = appendToUI('ai', 'Thinking...');
            
            try {
                const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${GROQ_KEY}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        model: "llama-3.3-70b-versatile",
                        messages: [
                            { role: "system", content: "Kamu BlueGen AI v16. Jawab dengan gaya programmer pro. Gunakan format Markdown yang sangat rapi. Tebalkan (**) pada poin penting." },
                            { role: "user", content: text }
                        ]
                    })
                });

                const data = await response.json();
                lastResp = data.choices[0].message.content;
                loading.innerHTML = formatAIResponse(lastResp);
                loading.querySelectorAll('pre code').forEach(el => hljs.highlightElement(el));
                saveChat('ai', lastResp); saveChat('user', text);
            } catch (e) {
                loading.innerHTML = `<span class="text-red-500 mono font-bold">[ERR] Kernel Panic: ${e.message}</span>`;
            }
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function downloadCode(content, filename) {
            const blob = new Blob([content], { type: 'text/plain' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = filename; a.click();
        }

        function saveChat(role, text) {
            const h = JSON.parse(localStorage.getItem('bluegen_history') || "[]");
            h.push({ role, text });
            localStorage.setItem('bluegen_history', JSON.stringify(h.slice(-10)));
        }

        function loadHistory() {
            const h = JSON.parse(localStorage.getItem('bluegen_history') || "[]");
            if(h.length) {
                document.getElementById('welcomeScreen').classList.add('hidden');
                h.forEach(m => appendToUI(m.role, m.text));
            }
        }

        function showDevInfo() { document.getElementById('devModal').classList.remove('hidden'); }
        function closeDevInfo() { document.getElementById('devModal').classList.add('hidden'); }
        function copyLast() { if(lastResp) { navigator.clipboard.writeText(lastResp); alert("SYNC: OK"); } }
        function clearMemory() { if(confirm('Flush Memory?')) { localStorage.clear(); location.reload(); } }

        userInput.addEventListener('input', function() { this.style.height = 'auto'; this.style.height = (this.scrollHeight) + 'px'; });
        userInput.addEventListener('keydown', (e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSend(); } });
    </script>
</body>
</html>
